<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analysis</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="/static/theme.css?v=__STATIC_VERSION__">
  <link rel="stylesheet" href="/static/lab.css?v=__STATIC_VERSION__">
  <link rel="stylesheet" href="/static/datagen.css?v=__STATIC_VERSION__">
  <link rel="stylesheet" href="/static/analysis.css?v=__STATIC_VERSION__">
</head>
<body class="catalog-page analysis-page" data-page="analysis">
  <main class="catalog-main">
    <aside class="catalog-pane catalog-list-pane">
      <div class="catalog-pane-topline">
        <div class="page-menu-wrap">
          <button class="page-menu-btn" id="pageMenuBtn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="pageMenuPopover">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2.5 4H13.5"/><path d="M2.5 8H13.5"/><path d="M2.5 12H13.5"/></svg>
          </button>
          <div class="page-menu-popover" id="pageMenuPopover" hidden>
            <a class="page-menu-link" href="/">Workspace</a>
            <a class="page-menu-link" href="/samples/">Samples</a>
            <a class="page-menu-link" href="/calculators/">Calculators</a>
            <a class="page-menu-link" href="/experiments/">Experiments</a>
            <a class="page-menu-link current" href="/analysis/">Analysis</a>
            <a class="page-menu-link" href="/build/">Build</a>
          </div>
        </div>
        <a class="as-nav-link" href="/analysis-startup/" title="New Analysis" aria-label="New Analysis">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7.5 2.5V12.5"/><path d="M2.5 7.5H12.5"/></svg>
        </a>
      </div>
      <div class="catalog-list" id="analysisList"></div>
    </aside>
    <div class="pane-splitter catalog-splitter" id="catalogLeftSplitter" aria-hidden="true"></div>

    <section class="catalog-pane catalog-content-pane">
      <div class="catalog-content-head">
        <div class="catalog-content-title" id="analysisTitle"></div>
        <div class="catalog-content-meta" id="analysisMeta"></div>
      </div>
      <div class="analysis-body" id="analysisBody"></div>
    </section>
    <div class="pane-splitter catalog-splitter" id="catalogRightSplitter" aria-hidden="true"></div>

    <aside class="catalog-pane catalog-side-pane">
      <div class="catalog-pane-topline">
        <select class="side-panel-select" id="analysisSidePanelSelect" aria-label="Right panel section">
          <option value="info">Info</option>
          <option value="json">JSON</option>
          <option value="links">Links</option>
        </select>
      </div>
      <div id="analysisSideInfo" class="data-info-panel">
        <div class="catalog-key-grid" id="analysisInfo"></div>
        <div class="attachments-section" id="attachmentsSection" hidden>
          <div class="attachments-label">Uploads</div>
        </div>
        <div class="memo-panel">
          <div class="memo-label">Memo</div>
          <div class="memo-input-wrap">
            <textarea class="memo-input" id="memoInput" placeholder="Quick notes…" disabled></textarea>
            <button class="memo-btn memo-save-btn" id="memoSaveBtn" disabled title="Save (⌘S)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
          </div>
        </div>
      </div>
      <div id="analysisSideJson" hidden>
        <div class="json-panel-body" id="analysisJson"></div>
      </div>
      <div id="analysisSideLinks" hidden>
        <div class="related-links" id="analysisLinks"></div>
      </div>
    </aside>
  </main>

  <div class="footer">
    <span class="status" id="status"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/static/markdown_render.js?v=__STATIC_VERSION__"></script>
  <script src="/static/page_menu.js?v=__STATIC_VERSION__"></script>
  <script src="/static/catalog_utils.js?v=__STATIC_VERSION__"></script>
  <script src="/static/pane_resize.js?v=__STATIC_VERSION__"></script>
  <script src="/static/drop_upload.js?v=__STATIC_VERSION__"></script>
  <script src="/static/analysis.js?v=__STATIC_VERSION__"></script>
</body>
</html>
