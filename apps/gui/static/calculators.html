<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculators</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="/static/datparser.css?v=__STATIC_VERSION__">
  <link rel="stylesheet" href="/static/datagen.css?v=__STATIC_VERSION__">
</head>
<body class="catalog-page calculators-page" data-page="calculators">
  <main class="catalog-main">
    <aside class="catalog-pane catalog-list-pane">
      <div class="catalog-pane-topline">
        <div class="page-menu-wrap">
          <button class="page-menu-btn" id="pageMenuBtn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="pageMenuPopover">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2.5 4H13.5"/><path d="M2.5 8H13.5"/><path d="M2.5 12H13.5"/></svg>
          </button>
          <div class="page-menu-popover" id="pageMenuPopover" hidden>
            <a class="page-menu-link" href="/">Workspace</a>
            <a class="page-menu-link" href="/samples/">Samples</a>
            <a class="page-menu-link current" href="/calculators/">Calculators</a>
            <a class="page-menu-link" href="/experiments/">Experiments</a>
            <a class="page-menu-link" href="/analysis/">Analysis</a>
            <a class="page-menu-link" href="/build/">Build</a>
          </div>
        </div>
      </div>
      <div class="catalog-list" id="calculatorList"></div>
    </aside>
    <div class="pane-splitter catalog-splitter" id="catalogLeftSplitter" aria-hidden="true"></div>

    <section class="catalog-pane catalog-content-pane">
      <div class="catalog-content-head">
        <div class="catalog-content-title" id="calculatorTitle"></div>
        <div class="catalog-content-subtitle" id="calculatorSubtitle"></div>
      </div>
      <div class="readme-content markdown-body" id="calculatorReadme"></div>
    </section>
    <div class="pane-splitter catalog-splitter" id="catalogRightSplitter" aria-hidden="true"></div>

    <aside class="catalog-pane catalog-side-pane">
      <div class="catalog-pane-topline">
        <select class="side-panel-select" id="calculatorSidePanelSelect" aria-label="Right panel section">
          <option value="info">Info</option>
          <option value="json">JSON</option>
          <option value="links">Links</option>
        </select>
      </div>
      <div id="calculatorInfoPanel">
        <div class="catalog-key-grid" id="calculatorInfo"></div>
      </div>
      <div id="calculatorJsonPanel" hidden>
        <div class="json-panel-body" id="calculatorJson"></div>
      </div>
      <div id="calculatorLinksPanel" hidden>
        <div class="catalog-link-group">
          <div class="catalog-link-block">
            <div class="catalog-link-label">FILES</div>
            <div class="catalog-link-list" id="calculatorLinks"></div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <div class="footer">
    <span class="status" id="status"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/static/markdown_render.js?v=__STATIC_VERSION__"></script>
  <script src="/static/page_menu.js?v=__STATIC_VERSION__"></script>
  <script src="/static/pane_resize.js?v=__STATIC_VERSION__"></script>
  <script src="/static/calculators.js?v=__STATIC_VERSION__"></script>
</body>
</html>
