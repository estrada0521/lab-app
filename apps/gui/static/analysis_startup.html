<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Analysis</title>
  <link rel="stylesheet" href="/static/theme.css?v=__STATIC_VERSION__">
  <link rel="stylesheet" href="/static/lab.css?v=__STATIC_VERSION__">
  <link rel="stylesheet" href="/static/datagen.css?v=__STATIC_VERSION__">
</head>
<body class="viewer-page new-analysis-page">
  <main id="asMain">

    <aside class="browser-pane" aria-label="Data browser">
      <div class="browser-topline">
        <a class="as-back-to-analysis" href="/analysis/" aria-label="Analysis に戻る" title="Analysis に戻る">
          <svg class="as-back-to-analysis-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 3L5 8l5 5"/></svg>
          <span class="as-back-to-analysis-label">Analysis</span>
        </a>
      </div>
      <div class="browser-filter-grid">
        <label for="asKindFilter">kind</label>
        <select id="asKindFilter"></select>
        <label for="asConditionFilter">condition</label>
        <select id="asConditionFilter"></select>
        <label for="asSampleFilter">sample</label>
        <select id="asSampleFilter"></select>
      </div>
      <div class="browser-list" id="asDataList" tabindex="0"></div>
    </aside>

    <div class="pane-splitter" id="leftSplitter" aria-hidden="true"></div>

    <section class="side-section as-preview-section">
      <div class="side-panels">
        <section class="side-panel is-active">
          <div class="as-right-scroll">
            <div class="as-preview-head-row">
              <div id="asPreviewTitle" class="as-preview-title" title="">—</div>
              <div class="as-preview-head-actions">
                <button type="button" id="asDeleteBtn" class="as-icon-delete-btn" title="Remove from selected cell(s)" disabled aria-label="Remove from selected cell(s)">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 4h11"/><path d="M5.5 4V3h5v1"/><path d="M6 6.5v6.5M8 6.5v6.5M10 6.5v6.5"/><path d="M5 6.5h6l-.6 7H5.6l-.6-7z"/></svg>
                </button>
                <button type="button" id="asAddBtn" class="as-icon-add-btn" title="Add to cell（Shift/⌘で選んだ長方形は 1 つの ax に結合）" disabled aria-label="Add to cell">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><path d="M8 3.5v9"/><path d="M3.5 8h9"/></svg>
                </button>
              </div>
            </div>
            <div class="as-preview-graph" id="asPreviewGraph">
              <span class="as-hint">Click data from the list</span>
            </div>
            <div class="as-preview-body-scroll">
              <div class="as-preview-info-ltr">
                <div class="data-info-grid as-preview-info" id="asPreviewInfo"></div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </section>

    <div class="pane-splitter" id="rightSplitter" aria-hidden="true"></div>

    <section class="as-grid-pane" aria-label="Analysis grid">
      <div class="as-grid-controls">
        <label class="generate-name-field inline" for="asDisplayName"><span>Display Name</span><input id="asDisplayName" placeholder="optional" autocomplete="off"></label>
        <button class="generate-btn" id="asStartBtn" type="button" title="Create analysis" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8H11.5"/><path d="M8.5 4.8L11.7 8L8.5 11.2"/><path d="M13.5 3.2V12.8"/></svg>
        </button>
        <div class="as-grid-controls-sep"></div>
        <label class="as-dim-label">Rows<input type="number" id="asRows" class="as-dim-input" min="1" max="8" value="2"></label>
        <label class="as-dim-label">Cols<input type="number" id="asCols" class="as-dim-input" min="1" max="8" value="2"></label>
      </div>
      <div class="as-grid-wrap">
        <div class="as-grid" id="asGrid"></div>
      </div>
    </section>

  </main>

  <div class="footer">
    <span class="status" id="status"></span>
  </div>

  <script src="/static/page_menu.js?v=__STATIC_VERSION__"></script>
  <script src="/static/info/common.js?v=__STATIC_VERSION__"></script>
  <script src="/static/info/data.js?v=__STATIC_VERSION__"></script>
  <script src="/static/pane_resize.js?v=__STATIC_VERSION__"></script>
  <script src="/static/analysis_startup.js?v=__STATIC_VERSION__"></script>
</body>
</html>
